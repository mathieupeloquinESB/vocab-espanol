<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulaire Espagnol</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
body { background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
#app { width: 100%; max-width: 680px; }
.screen { display: none; }
.screen.active { display: block; }

/* Setup */
h1 { font-size: 24px; font-weight: bold; margin-bottom: 0.25rem; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.themes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.theme-card { background: #fff; border: 2px solid #ddd; border-radius: 10px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s, background 0.15s; user-select: none; }
.theme-card:hover { border-color: #aaa; }
.theme-card.checked { border-color: #111; background: #111; color: #fff; }
.theme-card .check { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.theme-card.checked .check { border-color: #fff; background: #fff; color: #111; }
.theme-name { font-size: 14px; font-weight: bold; line-height: 1.3; }
.theme-count { font-size: 12px; opacity: 0.6; }
.select-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.select-row button { flex: 1; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
.select-row button:hover { background: #f0f0f0; }
.btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border: 1px solid #ccc; border-radius: 10px; background: #fff; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: #f0f0f0; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { background: #333; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.word-count-info { font-size: 13px; color: #666; text-align: center; margin-bottom: 0.75rem; }

/* Game */
.game-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 2rem; text-align: center; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; cursor: pointer; user-select: none; }
.game-card:hover { border-color: #aaa; }
#hint-display { font-size: 30px; font-weight: bold; color: #111; background: #f0f0f0; border-radius: 10px; padding: 1rem 1.5rem; min-height: 75px; display: flex; align-items: center; justify-content: center; text-align: center; max-width: 100%; }
#word-big { font-size: 38px; font-weight: bold; color: #111; min-height: 56px; display: flex; align-items: center; justify-content: center; text-align: center; }
#theme-badge { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.07em; }
#hint { font-size: 12px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; }
.progress-bar-track { width: 100%; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin-bottom: 0.75rem; }
.progress-bar-fill { height: 100%; background: #111; border-radius: 2px; transition: width 0.3s; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-size: 13px; color: #666; }

/* Done */
#done { text-align: center; padding: 3rem 0; }
</style>
</head>
<body>
<div id="app">

  <div id="setup" class="screen active">
    <h1>Vocabulaire espagnol</h1>
    <p class="subtitle">Choisissez les thèmes à réviser :</p>
    <div class="select-row">
      <button onclick="selectAll()">Tout cocher</button>
      <button onclick="selectNone()">Tout décocher</button>
    </div>
    <div class="themes-grid" id="themes-grid"></div>
    <p class="word-count-info" id="word-count-info">0 mot sélectionné</p>
    <button class="btn btn-primary" id="start-btn" onclick="startSession()" disabled>Démarrer l'exercice</button>
  </div>

  <div id="game" class="screen">
    <div class="top-bar">
      <span id="progress-text">Mot 0 / 0</span>
      <button class="btn" style="width:auto;padding:6px 14px;font-size:13px;" onclick="resetApp()">Quitter</button>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="game-card" onclick="handleClick()">
      <div id="theme-badge"></div>
      <div id="hint-display">❔</div>
      <div id="word-big" style="visibility:hidden;"></div>
      <div id="hint">Cliquez pour commencer</div>
    </div>
    <button class="btn" style="margin-top:12px;font-size:14px;" onclick="handleClick()">Continuer →</button>
  </div>

  <div id="done" class="screen">
    <div style="font-size:60px;margin-bottom:1rem;">✅</div>
    <p style="font-size:22px;font-weight:bold;margin-bottom:0.5rem;">Exercice terminé !</p>
    <p id="done-count" style="font-size:14px;color:#666;margin-bottom:1.5rem;"></p>
    <button class="btn btn-primary" onclick="resetApp()" style="max-width:260px;margin:0 auto;">Choisir les thèmes</button>
  </div>

</div>

// --- UI Setup ---
const themeNames = Object.keys(THEMES);
const selected = new Set();

function renderThemes() {
  const grid = document.getElementById('themes-grid');
  grid.innerHTML = '';
  themeNames.forEach(name => {
    const count = Object.keys(THEMES[name]).length;
    const isChecked = selected.has(name);
    const card = document.createElement('div');
    card.className = 'theme-card' + (isChecked ? ' checked' : '');
    card.innerHTML = `<div class="check">${isChecked ? '✓' : ''}</div><div><div class="theme-name">${name}</div><div class="theme-count">${count} mots</div></div>`;
    card.onclick = () => toggleTheme(name);
    grid.appendChild(card);
  });
  updateWordCount();
}

function toggleTheme(name) {
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  renderThemes();
}

function selectAll() { themeNames.forEach(n => selected.add(n)); renderThemes(); }
function selectNone() { selected.clear(); renderThemes(); }

function updateWordCount() {
  const pool = buildPool();
  const n = pool.length;
  document.getElementById('word-count-info').textContent = n === 0 ? 'Aucun thème sélectionné' : n + ' mot' + (n > 1 ? 's' : '') + ' sélectionné' + (n > 1 ? 's' : '');
  document.getElementById('start-btn').disabled = n === 0;
}

function buildPool() {
  const pool = [];
  selected.forEach(theme => {
    Object.entries(THEMES[theme]).forEach(([es, [fr, esArt]]) => {
      pool.push({ fr, es: esArt, theme });
    });
  });
  return pool;
}

renderThemes();

// --- Game ---
let words = [], idx = 0, phase = 'start';

function show(id) {
  ['setup','game','done'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startSession() {
  const pool = buildPool();
  if (!pool.length) return;
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  words = pool;
  idx = 0; phase = 'start';
  show('game');
  updateProgress();
  document.getElementById('hint-display').textContent = '❔';
  document.getElementById('word-big').style.visibility = 'hidden';
  document.getElementById('theme-badge').textContent = '';
  document.getElementById('hint').textContent = 'Cliquez pour afficher la traduction française';
}

function updateProgress() {
  document.getElementById('progress-text').textContent = 'Mot ' + idx + ' / ' + words.length;
  document.getElementById('progress-fill').style.width = (idx / words.length * 100) + '%';
}

function handleClick() {
  if (phase === 'start' || phase === 'image') {
    const w = words[idx];
    document.getElementById('hint-display').textContent = w.fr;
    document.getElementById('theme-badge').textContent = w.theme;
    document.getElementById('word-big').style.visibility = 'hidden';
    document.getElementById('hint').textContent = 'Cliquez pour afficher le mot espagnol';
    phase = 'word';
  } else if (phase === 'word') {
    const w = words[idx];
    document.getElementById('word-big').textContent = w.es;
    document.getElementById('word-big').style.visibility = 'visible';
    idx++;
    updateProgress();
    if (idx >= words.length) {
      setTimeout(() => {
        document.getElementById('done-count').textContent = words.length + ' mot' + (words.length > 1 ? 's' : '') + ' révisé' + (words.length > 1 ? 's' : '');
        show('done');
      }, 700);
      document.getElementById('hint').textContent = 'Exercice terminé !';
      phase = 'done';
    } else {
      document.getElementById('hint').textContent = 'Cliquez pour le mot suivant';
      phase = 'image';
    }
  }
}

function resetApp() {
  idx = 0; phase = 'start';
  show('setup');
}
